name: Compile & Publish Artifacts

on:
  workflow_dispatch:
  push:
    paths:
      - 'contract/LuckyVoiRoll.py'

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyTeal
        run: pip install pyteal==0.25.0 algosdk

      - name: Compile contract
        run: python contract/LuckyVoiRoll.py

      - name: Verify artifacts
        run: |
          ls -la artifacts/
          test -f artifacts/LuckyVoiRoll.approval.teal || (echo "ERROR: approval.teal missing" && exit 1)
          test -f artifacts/LuckyVoiRoll.clear.teal    || (echo "ERROR: clear.teal missing"    && exit 1)
          test -f artifacts/LuckyVoiRoll.arc32.json    || (echo "ERROR: arc32.json missing"    && exit 1)
          echo "All 3 artifacts present."

      - name: Commit artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f artifacts/
          git diff --staged --quiet && echo "No changes" || git commit -m "chore: compile artifacts [skip ci]"
          git push
